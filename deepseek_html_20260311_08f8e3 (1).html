<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Lab 6 - Clip Space & Translation</title>
    <style>
        canvas { 
            border: 2px solid black; 
        }
    </style>
</head>
<body>
    <h2>Лабораторна робота №6</h2>
    <p>Система координат WebGL (Clip Space). Переміщення об'єкта (Translation)</p>
    
    <canvas id="glCanvas" width="700" height="500"></canvas>

    <script>
        // ================= 1. ОТРИМАННЯ КОНТЕКСТУ =================
        const canvas = document.getElementById("glCanvas");
        const gl = canvas.getContext("webgl2");
        
        if (!gl) {
            alert("WebGL 2.0 не підтримується");
        }

        // ================= 2. ВЕРШИННИЙ ШЕЙДЕР =================
        const vertexShaderSource = `#version 300 es
        in vec2 a_position;              // координати вершини
        uniform vec2 u_translation;       // вектор переміщення
        
        void main() {
            // Додаємо переміщення до координат вершини
            vec2 position = a_position + u_translation;
            gl_Position = vec4(position, 0.0, 1.0);
        }`;

        // ================= 3. ФРАГМЕНТНИЙ ШЕЙДЕР =================
        const fragmentShaderSource = `#version 300 es
        precision highp float;
        out vec4 outColor;
        
        void main() {
            outColor = vec4(0.2, 0.6, 0.9, 1.0);   // блакитний колір
        }`;

        // ================= 4. ФУНКЦІЯ СТВОРЕННЯ ШЕЙДЕРА =================
        function createShader(type, source) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);
            
            // Перевірка на помилки компіляції
            if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                console.error(gl.getShaderInfoLog(shader));
                return null;
            }
            return shader;
        }

        // ================= 5. КОМПІЛЯЦІЯ ШЕЙДЕРІВ =================
        const vs = createShader(gl.VERTEX_SHADER, vertexShaderSource);
        const fs = createShader(gl.FRAGMENT_SHADER, fragmentShaderSource);

        // ================= 6. СТВОРЕННЯ ПРОГРАМИ =================
        const program = gl.createProgram();
        gl.attachShader(program, vs);
        gl.attachShader(program, fs);
        gl.linkProgram(program);
        
        // Перевірка на помилки лінкування
        if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
            console.error(gl.getProgramInfoLog(program));
        }
        
        gl.useProgram(program);

        // ================= 7. ГЕОМЕТРІЯ (КВАДРАТ) =================
        // Квадрат у Clip Space (координати від -1 до 1)
        const vertices = new Float32Array([
            -0.2,  0.2,   // ліва верхня
             0.2,  0.2,   // права верхня
            -0.2, -0.2,   // ліва нижня
             0.2, -0.2    // права нижня
        ]);

        // ================= 8. ПЕРЕДАЧА ДАНИХ У GPU =================
        const buffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
        gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);

        // ================= 9. ЗВ'ЯЗУВАННЯ АТРИБУТІВ =================
        const positionLocation = gl.getAttribLocation(program, "a_position");
        gl.enableVertexAttribArray(positionLocation);
        gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);

        // ================= 10. ОТРИМАННЯ UNIFORM =================
        const translationLocation = gl.getUniformLocation(program, "u_translation");

        // ================= 11. НАЛАШТУВАННЯ СЦЕНИ =================
        gl.viewport(0, 0, canvas.width, canvas.height);
        gl.clearColor(1, 1, 1, 1);   // білий фон

        // ================= 12. ЗМІННІ ДЛЯ ПЕРЕМІЩЕННЯ =================
        let x = 0;           // позиція по X
        let y = 0;           // позиція по Y
        const speed = 0.03;  // швидкість руху

        // ================= 13. ОБРОБКА КЛАВІШ =================
        window.addEventListener("keydown", function(event) {
            if (event.key === "ArrowLeft")  x -= speed;
            if (event.key === "ArrowRight") x += speed;
            if (event.key === "ArrowUp")    y += speed;
            if (event.key === "ArrowDown")  y -= speed;
            
            // Обмеження, щоб квадрат не виходив за межі видимості
            x = Math.max(-0.8, Math.min(0.8, x));
            y = Math.max(-0.8, Math.min(0.8, y));
        });

        // ================= 14. ФУНКЦІЯ РЕНДЕРИНГУ =================
        function render() {
            // Очищуємо екран
            gl.clear(gl.COLOR_BUFFER_BIT);
            
            // Передаємо нову позицію в шейдер
            gl.uniform2f(translationLocation, x, y);
            
            // Малюємо квадрат (TRIANGLE_STRIP використовує 4 вершини для двох трикутників)
            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
            
            // Запитуємо наступний кадр
            requestAnimationFrame(render);
        }

        // Запускаємо анімаційний цикл
        render();
    </script>
</body>
</html>
