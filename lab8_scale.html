<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Lab 8 - Scale</title>
    <style>
        canvas { 
            border: 2px solid black; 
        }
    </style>
</head>
<body>
    <h2>Лабораторна робота №8</h2>
    <p>Масштабування трикутника (Scale)</p>
    
    <canvas id="glCanvas" width="600" height="400"></canvas>

    <script>
        // ===== 1. ОТРИМАННЯ КОНТЕКСТУ =====
        const canvas = document.getElementById("glCanvas");
        const gl = canvas.getContext("webgl2");
        
        if (!gl) {
            alert("WebGL 2.0 не підтримується");
        }

        // ===== 2. ВЕРШИННИЙ ШЕЙДЕР =====
        const vertexShaderSource = `#version 300 es
        in vec2 a_position;              // координати вершини
        uniform vec2 u_scale;             // коефіцієнт масштабу (по X та Y)
        
        void main() {
            // Масштабування: множимо координати на коефіцієнт
            vec2 scaled = a_position * u_scale;
            gl_Position = vec4(scaled, 0.0, 1.0);
        }`;

        // ===== 3. ФРАГМЕНТНИЙ ШЕЙДЕР =====
        const fragmentShaderSource = `#version 300 es
        precision highp float;
        out vec4 outColor;
        
        void main() {
            outColor = vec4(0.2, 0.5, 0.9, 1.0);   // блакитний колір
        }`;

        // ===== 4. ФУНКЦІЯ СТВОРЕННЯ ШЕЙДЕРА =====
        function createShader(type, source) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);
            
            // Перевірка на помилки компіляції
            if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                console.error(gl.getShaderInfoLog(shader));
                return null;
            }
            return shader;
        }

        // ===== 5. КОМПІЛЯЦІЯ ШЕЙДЕРІВ =====
        const vs = createShader(gl.VERTEX_SHADER, vertexShaderSource);
        const fs = createShader(gl.FRAGMENT_SHADER, fragmentShaderSource);

        // ===== 6. СТВОРЕННЯ ПРОГРАМИ =====
        const program = gl.createProgram();
        gl.attachShader(program, vs);
        gl.attachShader(program, fs);
        gl.linkProgram(program);
        
        // Перевірка на помилки лінкування
        if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
            console.error(gl.getProgramInfoLog(program));
        }
        
        gl.useProgram(program);

        // ===== 7. ГЕОМЕТРІЯ (ТРИКУТНИК) =====
        const vertices = new Float32Array([
             0.0,  0.6,   // вершина 0 (верх)
            -0.6, -0.6,   // вершина 1 (лівий низ)
             0.6, -0.6    // вершина 2 (правий низ)
        ]);

        // ===== 8. ПЕРЕДАЧА ДАНИХ У GPU =====
        const buffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
        gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);

        // ===== 9. ЗВ'ЯЗУВАННЯ АТРИБУТІВ =====
        const positionLocation = gl.getAttribLocation(program, "a_position");
        gl.enableVertexAttribArray(positionLocation);
        gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);

        // ===== 10. ОТРИМАННЯ UNIFORM =====
        const scaleLocation = gl.getUniformLocation(program, "u_scale");

        // ===== 11. НАЛАШТУВАННЯ СЦЕНИ =====
        gl.viewport(0, 0, canvas.width, canvas.height);
        gl.clearColor(1.0, 1.0, 1.0, 1.0);   // білий фон

        // ===== 12. АНІМАЦІЯ МАСШТАБУВАННЯ =====
        let scale = 1.0;        // початковий масштаб
        let growing = true;     // напрям зміни (збільшення/зменшення)

        function render() {
            // Змінюємо масштаб залежно від напрямку
            if (growing) {
                scale += 0.01;
                if (scale > 1.5) growing = false;   // досягли максимуму
            } else {
                scale -= 0.01;
                if (scale < 0.5) growing = true;    // досягли мінімуму
            }
            
            // Очищуємо екран
            gl.clear(gl.COLOR_BUFFER_BIT);
            
            // Передаємо масштаб у шейдер (однаковий для X та Y)
            gl.uniform2f(scaleLocation, scale, scale);
            
            // Малюємо трикутник
            gl.drawArrays(gl.TRIANGLES, 0, 3);
            
            // Запитуємо наступний кадр
            requestAnimationFrame(render);
        }

        // Запускаємо анімацію
        render();
    </script>
</body>
</html>
