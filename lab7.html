<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Lab 7 - Rotation</title>
    <style>
        canvas { 
            border: 2px solid black; 
        }
    </style>
</head>
<body>
    <h2>Лабораторна робота №7</h2>
    <p>Обертання трикутника (Rotation)</p>
    
    <canvas id="glCanvas" width="600" height="400"></canvas>

    <script>
        // ===== 1. ОТРИМАННЯ КОНТЕКСТУ =====
        const canvas = document.getElementById("glCanvas");
        const gl = canvas.getContext("webgl2");
        
        if (!gl) {
            alert("WebGL 2.0 не підтримується");
        }

        // ===== 2. ВЕРШИННИЙ ШЕЙДЕР =====
        const vertexShaderSource = `#version 300 es
        in vec2 a_position;              // координати вершини
        uniform float u_angle;            // кут повороту в радіанах
        
        void main() {
            // Матриця повороту в 2D:
            // x' = x * cos(angle) - y * sin(angle)
            // y' = x * sin(angle) + y * cos(angle)
            
            float c = cos(u_angle);
            float s = sin(u_angle);
            
            vec2 rotated = vec2(
                a_position.x * c - a_position.y * s,
                a_position.x * s + a_position.y * c
            );
            
            gl_Position = vec4(rotated, 0.0, 1.0);
        }`;

        // ===== 3. ФРАГМЕНТНИЙ ШЕЙДЕР =====
        const fragmentShaderSource = `#version 300 es
        precision highp float;
        out vec4 outColor;
        
        void main() {
            outColor = vec4(0.9, 0.2, 0.3, 1.0);   // червоний колір
        }`;

        // ===== 4. ФУНКЦІЯ СТВОРЕННЯ ШЕЙДЕРА =====
        function createShader(type, source) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);
            
            // Перевірка на помилки компіляції
            if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                console.error(gl.getShaderInfoLog(shader));
                return null;
            }
            return shader;
        }

        // ===== 5. КОМПІЛЯЦІЯ ШЕЙДЕРІВ =====
        const vs = createShader(gl.VERTEX_SHADER, vertexShaderSource);
        const fs = createShader(gl.FRAGMENT_SHADER, fragmentShaderSource);

        // ===== 6. СТВОРЕННЯ ПРОГРАМИ =====
        const program = gl.createProgram();
        gl.attachShader(program, vs);
        gl.attachShader(program, fs);
        gl.linkProgram(program);
        
        // Перевірка на помилки лінкування
        if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
            console.error(gl.getProgramInfoLog(program));
        }
        
        gl.useProgram(program);

        // ===== 7. ГЕОМЕТРІЯ (ТРИКУТНИК) =====
        const vertices = new Float32Array([
             0.0,  0.6,   // вершина 0 (верх)
            -0.6, -0.6,   // вершина 1 (лівий низ)
             0.6, -0.6    // вершина 2 (правий низ)
        ]);

        // ===== 8. ПЕРЕДАЧА ДАНИХ У GPU =====
        const buffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
        gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);

        // ===== 9. ЗВ'ЯЗУВАННЯ АТРИБУТІВ =====
        const positionLocation = gl.getAttribLocation(program, "a_position");
        gl.enableVertexAttribArray(positionLocation);
        gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);

        // ===== 10. ОТРИМАННЯ UNIFORM =====
        const angleLocation = gl.getUniformLocation(program, "u_angle");

        // ===== 11. НАЛАШТУВАННЯ СЦЕНИ =====
        gl.viewport(0, 0, canvas.width, canvas.height);
        gl.clearColor(1.0, 1.0, 1.0, 1.0);   // білий фон

        // ===== 12. АНІМАЦІЯ ОБЕРТАННЯ =====
        let angle = 0;                        // початковий кут

        function render() {
            // Збільшуємо кут (швидкість обертання)
            angle += 0.02;
            
            // Очищуємо екран
            gl.clear(gl.COLOR_BUFFER_BIT);
            
            // Передаємо кут у шейдер
            gl.uniform1f(angleLocation, angle);
            
            // Малюємо трикутник
            gl.drawArrays(gl.TRIANGLES, 0, 3);
            
            // Запитуємо наступний кадр
            requestAnimationFrame(render);
        }

        // Запускаємо анімацію
        render();
    </script>
</body>
</html>
